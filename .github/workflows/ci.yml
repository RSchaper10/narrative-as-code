name: CI

on:
  push:
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zsh pandoc

      - name: Install Python dependencies
        run: |
          python3 -m pip install -r requirements-dev.txt
          python3 -m pip install -r requirements-docx.txt

      - name: Run setup check
        run: python3 scripts/check-setup.py

      - name: Validate project
        run: python3 scripts/validate-project.py

      - name: Build manuscript artifacts
        run: ./scripts/build-manuscript.sh

      - name: Run tests
        run: python3 -m unittest discover -s tests -v
